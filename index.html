<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiksha Vibhag — RBSE Board Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-family: Arial, sans-serif; padding-top: 80px; }
        .navbar { background-color: #0d1b3e; }
        .navbar-brand { color: white !important; font-weight: bold; font-size: 1.5rem; }
        .navbar-brand span { color: #f39c12; }
        .search-card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 2rem; border-top: 4px solid #f39c12;}
        .table th { background-color: #0d1b3e; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><span>Shiksha</span> Vibhag</a>
        </div>
    </nav>

    <div class="container">
        <div class="search-card">
            <h4 class="mb-4 text-primary"><i class="fas fa-search"></i> Student Result Tracker</h4>
            <form id="resultForm">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label fw-bold small text-muted">Year</label>
                        <select class="form-select" id="year">
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold small text-muted">Class</label>
                        <select class="form-select" id="class">
                            <option value="12">12th</option>
                            <option value="10">10th</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small text-muted">Roll Number</label>
                        <input type="number" class="form-control" id="rollno" required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-warning w-100 fw-bold">Fetch Data</button>
                    </div>
                </div>
            </form>
        </div>

        <div id="statusMessage" class="alert" style="display:none;"></div>

        <div class="card shadow-sm" id="resultsSection" style="display: none;">
            <div class="card-body p-0 table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Roll No.</th>
                            <th>Name</th>
                            <th>Father Name</th>
                            <th>Total Marks</th>
                            <th>Result Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Yahan apne Python server ka IP address daalein agar live kar rahe hain
        const MY_CUSTOM_API_URL = 'http://localhost:5000/api/fetch_result';

        document.getElementById('resultForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const resultsSection = document.getElementById('resultsSection');
            const statusMessage = document.getElementById('statusMessage');
            const tbody = document.getElementById('tableBody');
            
            resultsSection.style.display = 'none';
            statusMessage.style.display = 'block';
            statusMessage.className = 'alert alert-info';
            statusMessage.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Fetching data from official servers...';

            const payload = {
                roll_no: document.getElementById('rollno').value,
                year: document.getElementById('year').value,
                class: document.getElementById('class').value
            };

            try {
                const response = await fetch(MY_CUSTOM_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                // Inject Custom API Data into Table
                tbody.innerHTML = `
                    <tr>
                        <td class="fw-bold">${data.roll_no}</td>
                        <td>${data.Name}</td>
                        <td>${data["Father Name"]}</td>
                        <td class="fw-bold text-primary">${data.Total_Marks}</td>
                        <td><span class="badge ${data.Result.toLowerCase().includes('fail') ? 'bg-danger' : 'bg-success'}">${data.Result}</span></td>
                    </tr>
                `;

                statusMessage.style.display = 'none';
                resultsSection.style.display = 'block';

            } catch (error) {
                statusMessage.className = 'alert alert-danger';
                statusMessage.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + error.message;
            }
        });
    </script>
</body>
</html>
